name: Build & Deploy (Middleman → GitHub Pages & S3)

on:
  push:
    branches: ["main", "staging"]
    paths-ignore:
      - "README.md"
  pull_request:
    branches: ["main", "staging"]
    types: [opened, synchronize, reopened, ready_for_review, closed]
    paths-ignore:
      - "README.md"
permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build site
        run: bundle exec middleman build --clean

      - name: Fix CSS absolute asset URLs for subpath hosting
        run: |
          PREFIX="/gcgs-cdp-documentation"

          # Only CSS url() - handle url("/..."), url('/...'), url(/...)
          find build -type f -name "*.css" -print0 | xargs -0 sed -i \
            -e "s|url(/|url($PREFIX/|g" \
            -e "s|url(\"/|url(\"$PREFIX/|g" \
            -e "s|url('/|url('$PREFIX/|g"

      - name: Upload Pages artifact (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Upload build artifact for S3 (staging only)
        if: github.ref == 'refs/heads/staging'
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: build
          if-no-files-found: error

  # -----------------------------
  # Deploy main → GitHub Pages
  # -----------------------------
  deploy_pages:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # -----------------------------
  # Deploy staging push → S3
  # -----------------------------
  deploy_staging:
    if: github.ref == 'refs/heads/staging'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch for custom actions
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          auth-method: ${{ vars.AWS_AUTH_METHOD }}   # set to 'oidc' or 'keys'
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - uses: ./.github/actions/configure-aws
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          auth-method: ${{ vars.AWS_AUTH_METHOD }}   # set to 'oidc' or 'keys'
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Sync to S3
        run: |
          aws s3 sync site "s3://${{ secrets.S3_BUCKET }}/staging/" --delete

  # ---------------------------------
  # PR Preview Deploy → S3
  # ---------------------------------
  pr_preview_deploy:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build site
        run: bundle exec middleman build --clean

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          auth-method: ${{ vars.AWS_AUTH_METHOD }}   # set to 'oidc' or 'keys'
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy PR preview
        run: |
          aws s3 sync build \
            "s3://${{ secrets.S3_BUCKET }}/previews/${{ github.event.pull_request.base.ref }}/pr${{ github.event.pull_request.number }}/" --delete

      - name: Comment preview URL on PR deployed
        uses: ./.github/actions/pr-preview-comment
        env:
          PREVIEW_BASE_URL: "http://${{ secrets.S3_BUCKET }}.s3-website.${{ secrets.AWS_REGION }}.amazonaws.com"
        with:
          github-token: ${{ github.token }}
          message: "✅ **Preview deployed**"
          url: "${{ env.PREVIEW_BASE_URL }}/previews/${{ github.event.pull_request.base.ref }}/pr${{ github.event.pull_request.number }}/"

  # ---------------------------------
  # PR Cleanup on Close
  # ---------------------------------
  pr_preview_cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          auth-method: ${{ vars.AWS_AUTH_METHOD }}   # set to 'oidc' or 'keys'
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Remove PR preview
        run: |
          aws s3 rm "s3://${{ secrets.S3_BUCKET }}/previews/${{ github.event.pull_request.base.ref }}/pr${{ github.event.pull_request.number }}/" --recursive

      - name: Comment preview URL on PR closed
        uses: ./.github/actions/pr-preview-comment
        env:
          PREVIEW_BASE_URL: "http://${{ secrets.S3_BUCKET }}.s3-website.${{ secrets.AWS_REGION }}.amazonaws.com"
        with:
          github-token: ${{ github.token }}
          message: "🧹 **Preview removed** (PR closed)"
          url: "${{ secrets.PREVIEW_BASE_URL }}/previews/${{ github.event.pull_request.base.ref }}/pr${{ github.event.pull_request.number }}/"
