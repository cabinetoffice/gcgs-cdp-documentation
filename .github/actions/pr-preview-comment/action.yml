name: PR Preview Comment
description: Create or update a single PR comment containing the preview URL
inputs:
  message:
    description: Message to display (e.g. "Preview deployed" or "Preview removed")
    required: true
  url:
    description: Preview URL
    required: true
  github-token:
    description: GitHub token with issues:write
    required: true

runs:
  using: "composite"
  steps:
    - name: Upsert PR preview comment
      uses: actions/github-script@v7
      env:
        PREVIEW_MESSAGE: ${{ inputs.message }}
        PREVIEW_URL: ${{ inputs.url }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const marker = '<!-- pr-preview-url -->';
          const url = process.env.PREVIEW_URL;
          const msg = process.env.PREVIEW_MESSAGE;

          const body = `${marker}
          ${msg}
          - ${url}
          `;

          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100
          });

          const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
          }