name: Configure AWS
description: Configure AWS credentials via OIDC or static keys
inputs:
  aws-region:
    description: "The region of the resource"
    required: true
  auth-method:
    description: "oidc or keys"
    required: true
  role-to-assume:
    description: ""
    required: false
  aws-access-key-id:
    description: ""
    required: false
  aws-secret-access-key:
    description: ""
    required: false

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      if: ${{ inputs.auth-method == 'oidc' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: ${{ inputs.role-to-assume }}

    - name: Configure AWS credentials (Access Keys)
      if: ${{ inputs.auth-method == 'keys' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws-region }}
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}